<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis in Progress — Chess CoachAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Ubuntu', sans-serif;
            color: #111;
            background: #f0f4f8;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.25rem;
            font-weight: 500;
            text-decoration: none;
            color: #111;
        }

        .logo .icon {
            font-size: 1.5rem;
        }

        .logo .ai {
            color: #2563eb;
            font-weight: 700;
        }

        .header-link {
            color: #6b7280;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }

        .header-link:hover {
            color: #111;
        }

        /* Main */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 80px 24px 40px;
        }

        /* Status Card */
        .status-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
        }

        .status-card.pulsing {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08); }
            50% { box-shadow: 0 4px 32px rgba(37, 99, 235, 0.15); }
        }

        /* Spinner */
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status icon */
        .status-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            line-height: 1;
        }

        .status-icon.success {
            color: #16a34a;
        }

        .status-icon.error {
            color: #dc2626;
        }

        /* Text */
        .status-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111;
        }

        .status-message {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            border-radius: 4px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #9ca3af;
            display: none;
        }

        /* Action buttons */
        .action-link {
            display: inline-block;
            margin-top: 16px;
            color: #2563eb;
            font-weight: 500;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .action-link:hover {
            color: #1d4ed8;
        }

        .retry-btn {
            display: inline-block;
            margin-top: 16px;
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Ubuntu', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #1d4ed8;
        }

        .error-detail {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 16px;
            color: #991b1b;
            font-size: 0.9rem;
            text-align: left;
            word-break: break-word;
        }

        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 0 16px;
            }

            .status-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <span class="icon">♞</span>
            <span>Chess Coach<span class="ai">AI</span></span>
        </a>
        <a href="/" class="header-link">← Back to Home</a>
    </header>

    <main class="container">
        <div class="status-card" id="status-card">
            <!-- Spinner (shown during pending/fetching/analyzing) -->
            <div class="spinner" id="spinner"></div>

            <!-- Success/error icons (hidden by default) -->
            <div class="status-icon success hidden" id="icon-success">✓</div>
            <div class="status-icon error hidden" id="icon-error">✗</div>

            <h2 class="status-title" id="status-title">Preparing your analysis...</h2>
            <p class="status-message" id="status-message">Please wait while we get things ready.</p>

            <!-- Progress bar -->
            <div class="progress-container" id="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text"></p>

            <!-- Error detail -->
            <div class="error-detail hidden" id="error-detail"></div>

            <!-- Action links -->
            <a href="/u/{{ user_path }}" class="action-link hidden" id="view-report">View Report →</a>

            <!-- Retry form -->
            <form action="/analyze" method="POST" class="hidden" id="retry-form">
                {% if chesscom_user %}
                <input type="hidden" name="chesscom_username" value="{{ chesscom_user }}">
                {% endif %}
                {% if lichess_user %}
                <input type="hidden" name="lichess_username" value="{{ lichess_user }}">
                {% endif %}
                <button type="submit" class="retry-btn">Try Again →</button>
            </form>
        </div>
    </main>

    <script>
        var STATUS_URL = '/u/{{ user_path }}/status/json';
        var REPORT_URL = '/u/{{ user_path }}';

        var card = document.getElementById('status-card');
        var spinner = document.getElementById('spinner');
        var iconSuccess = document.getElementById('icon-success');
        var iconError = document.getElementById('icon-error');
        var title = document.getElementById('status-title');
        var message = document.getElementById('status-message');
        var progressContainer = document.getElementById('progress-container');
        var progressFill = document.getElementById('progress-fill');
        var progressText = document.getElementById('progress-text');
        var errorDetail = document.getElementById('error-detail');
        var viewReport = document.getElementById('view-report');
        var retryForm = document.getElementById('retry-form');

        function updateUI(data) {
            // Reset visibility
            spinner.classList.remove('hidden');
            iconSuccess.classList.add('hidden');
            iconError.classList.add('hidden');
            progressContainer.style.display = 'none';
            progressText.style.display = 'none';
            errorDetail.classList.add('hidden');
            viewReport.classList.add('hidden');
            retryForm.classList.add('hidden');
            card.classList.remove('pulsing');

            switch (data.status) {
                case 'pending':
                    card.classList.add('pulsing');
                    title.textContent = 'Your analysis is queued...';
                    message.textContent = "You're in line. Analysis will begin shortly.";
                    break;

                case 'fetching':
                    title.textContent = 'Fetching your games...';
                    message.textContent = data.message || 'Downloading games from Chess.com and Lichess.';
                    progressContainer.style.display = 'block';
                    progressText.style.display = 'block';
                    var fetchPct = Math.min(data.progress_pct || 0, 30);
                    progressFill.style.width = fetchPct + '%';
                    progressText.textContent = data.message ? data.message + ' (' + fetchPct + '%)' : fetchPct + '% complete';
                    break;

                case 'analyzing':
                    title.textContent = 'Analyzing your openings...';
                    message.textContent = data.message || 'Running engine analysis...';
                    progressContainer.style.display = 'block';
                    progressText.style.display = 'block';
                    var pct = data.progress_pct || 0;
                    progressFill.style.width = pct + '%';
                    progressText.textContent = data.message ? data.message + ' (' + pct + '%)' : pct + '% complete';
                    break;

                case 'complete':
                    spinner.classList.add('hidden');
                    iconSuccess.classList.remove('hidden');
                    title.textContent = 'Analysis complete!';
                    message.textContent = 'Redirecting to your report...';
                    viewReport.classList.remove('hidden');
                    break;

                case 'failed':
                    spinner.classList.add('hidden');
                    iconError.classList.remove('hidden');
                    title.textContent = 'Analysis failed';
                    message.textContent = 'Something went wrong during analysis.';
                    if (data.error_message) {
                        errorDetail.textContent = data.error_message;
                        errorDetail.classList.remove('hidden');
                    }
                    retryForm.classList.remove('hidden');
                    break;

                default:
                    title.textContent = 'Checking status...';
                    message.textContent = 'Please wait.';
            }
        }

        function poll() {
            fetch(STATUS_URL)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    updateUI(data);
                    if (data.status === 'complete') {
                        setTimeout(function() { window.location.href = REPORT_URL; }, 1000);
                    } else if (data.status !== 'failed') {
                        setTimeout(poll, 3000);
                    }
                })
                .catch(function() {
                    setTimeout(poll, 5000);
                });
        }

        document.addEventListener('DOMContentLoaded', poll);
    </script>
</body>
</html>
